# Top-level configuration for Wrangler (PRODUCTION)
name = "swarley-club"
main ="src/index.js"
compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2024-09-23"

routes = [
  { pattern = "swarley.club/api/*", zone_name = "swarley.club" }
]

[observability.logs]
enabled = true

[vars]
# Max total bytes of stored submissions (pending + approved) before new uploads
# are refused. 5 GiB keeps a safe margin under R2's 10 GB free tier.
STORAGE_BUDGET_BYTES = 5368709120

[[d1_databases]]
binding = "DB"
database_name = "swarley-club"
database_id = "4fd463ae-0c35-4736-91a7-c40fbd703f78"

[[r2_buckets]]
binding = "SUBMISSIONS_BUCKET"
bucket_name = "swarley-submissions"

# Email notifications via Cloudflare Email Routing. Requires Email Routing to be
# enabled on swarley.club and mateoblackman@gmail.com verified as a destination
# address. Restricting destination_address means this binding can only ever mail
# that one address.
[[send_email]]
name = "SEND_EMAIL"
destination_address = "mateoblackman@gmail.com"

# ---------------------------------------------------------------------------
# DEV environment — fully isolated from production.
# Deploy with:  npx wrangler deploy --env dev
# Has NO swarley.club route, so it serves from a *.workers.dev URL only.
# Named bindings are NOT inherited from the top level, so they are repeated here
# pointing at SEPARATE dev resources.
# ---------------------------------------------------------------------------
[env.dev]
# Override the inherited production route: dev serves ONLY from *.workers.dev.
workers_dev = true
routes = []

[env.dev.observability.logs]
enabled = true

[env.dev.vars]
STORAGE_BUDGET_BYTES = 5368709120

[[env.dev.d1_databases]]
binding = "DB"
database_name = "swarley-club-dev"
database_id = "3ff53d92-afdf-4868-ac57-58479b3c43b7"

[[env.dev.r2_buckets]]
binding = "SUBMISSIONS_BUCKET"
bucket_name = "swarley-submissions-dev"

[[env.dev.send_email]]
name = "SEND_EMAIL"
destination_address = "mateoblackman@gmail.com"
